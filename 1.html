<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />

<style>
/* Base Styles */
body { background: #000000; font-family: Arial, sans-serif; padding: 10px; color: #ffffff; margin: 0; display: flex; justify-content: center; }
.main-container { max-width: 1200px; width: 100%; margin: 0 auto; padding: 0 15px; position: relative; }

/* Menu Bar */
.menu-bar { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    padding: 10px 0; 
    border-bottom: 2px solid #ff00a8; 
    margin-bottom: 15px; 
    position: relative; 
    min-height: 60px; 
}

/* Logo */
.logo-img { height: 60px; cursor: pointer; z-index: 10; }

/* Desktop Links */
.menu-links { display: flex; gap: 25px; }
.menu-links a { color: #ffffff; text-decoration: none; font-size: 16px; font-weight: bold; }
.menu-links a:hover { color: #ff00a8; }

/* Desktop Search */
.search-container { display: flex; align-items: center; }
#searchInput { padding: 8px 15px; border-radius: 20px; border: 2px solid #ff00a8; background: #222; color: white; width: 160px; outline: none; }
#searchBtn { background: #ff00a8; color: white; border: none; border-radius: 20px; padding: 8px 15px; margin-left: 5px; cursor: pointer; }

/* Mobile Menu Icons */
.hamburger { display: none; font-size: 28px; color: #ff00a8; cursor: pointer; }
.mobile-search-trigger { display: none; font-size: 22px; color: #ff00a8; cursor: pointer; }

/* Mobile Search Bar Overlay */
.mobile-search-bar {
    display: none;
    position: absolute;
    top: 65px;
    left: 0;
    right: 0;
    background: #111;
    padding: 10px;
    border: 1px solid #ff00a8;
    z-index: 100;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
.mobile-search-bar.active { display: flex; }
.mobile-search-bar input { flex: 1; padding: 12px; background: #222; border: none; color: white; border-radius: 5px 0 0 5px; }
.mobile-search-bar button { background: #ff00a8; border: none; color: white; padding: 12px; border-radius: 0 5px 5px 0; font-weight: bold; }

/* Player Area */
#player { display: none; margin: 15px auto; text-align: center; max-width: 900px; }
.video-wrapper { position: relative; width: 100%; background: #111; border-radius: 6px; overflow: hidden; aspect-ratio: 16/9; }
#player video, #player iframe { width: 100%; height: 100%; border-radius: 6px; border: none; object-fit: cover; }
.play-overlay-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 0, 168, 0.9); color: white; border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; padding-left: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }

/* Download & Tags */
.download-btn { display: inline-block; margin-top: 12px; padding: 10px 25px; background: #ff00a8; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
.tags-container { margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
.tag { background: #ff00a8; color: #ffffff; padding: 4px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; }

/* Main Video Grid */
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }
.grid.hidden { display: none; }
.card { cursor: pointer; transition: transform 0.2s; }
.card:hover { transform: scale(1.03); }
.thumb { position: relative; overflow: hidden; border-radius: 6px; background: #111; aspect-ratio: 16/9; }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.title { text-align: center; margin-top: 5px; font-size: 12px; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 5px; }

/* Pagination Styles */
.pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 30px 0; }
.pagination.hidden { display: none; }
.page-btn { background: #222; color: #ff00a8; border: 2px solid #ff00a8; padding: 8px 18px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.2s; }
.page-btn:hover:not(:disabled) { background: #ff00a8; color: white; }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-info { color: #ff00a8; font-weight: bold; }

/* MOBILE RESPONSIVE FIXES */
@media (max-width: 768px) {
    .menu-links, .search-container { display: none; } 
    .hamburger { display: block; } 
    .mobile-search-trigger { display: block; } 
    .logo-img { position: absolute; left: 50%; transform: translateX(-50%); height: 45px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .play-overlay-btn { width: 60px; height: 60px; font-size: 25px; }
}
</style>
</head>
<body>

<div class="main-container">
    <div class="menu-bar">
        <div class="hamburger" onclick="alert('Menu functionality can be added here')">☰</div>

        <img src="https://zpi.cx/b/uiDMr.png" class="logo-img" onclick="goHome()">

        <div class="menu-links">
            <a href="#" onclick="goHome(); return false;">Home</a>
            <a href="#">Trending</a>
            <a href="#">Latest</a>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search..." />
            <button id="searchBtn" onclick="desktopSearch()">🔍</button>
        </div>

        <div class="mobile-search-trigger" onclick="toggleMobileSearch()">🔍</div>

        <div class="mobile-search-bar" id="mobileSearchBar">
            <input type="text" id="mobileSearchInput" placeholder="Search videos...">
            <button onclick="mobileSearch()">Go</button>

    </div>

    <div id="player">
        <div class="tags-container" id="tagsContainer"></div>
        <div class="video-wrapper">
            <button id="startPlayBtn" class="play-overlay-btn" onclick="triggerActualPlay()">▶</button>
            <video id="mainVideo" controls playsinline oncontextmenu="return false;" controlslist="nodownload"></video>
            <iframe id="mainIframe" allowfullscreen style="display:none;"></iframe>
        </div>
        <div class="player-info"><h2 id="playerTitle" style="font-size:18px;"></h2></div>
        <div id="downloadBtn" class="download-btn" onclick="handleDownloadClick()">⬇ DOWNLOAD</div>
    </div>

    <div id="relatedSection" style="display:none; margin-top: 30px;">
        <div style="color:#ff00a8; font-weight:bold; margin-bottom:10px; border-left: 3px solid #ff00a8; padding-left: 10px;">Related Videos</div>
        <div class="grid" id="relatedGrid"></div>
    </div>

    <div class="grid" id="videoGrid"></div>

    <div class="pagination" id="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">Previous</button>
        <span class="page-info" id="pageNumber">Page 1</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</div>

<script>
// Ads & Data
const adLinks = ["https://omg10.com/4/8251888", "https://omg10.com/4/7512585", "https://omg10.com/4/8257954", "https://omg10.com/4/1415254", "https://omg10.com/4/7512545", "https://omg10.com/4/8198889", "https://omg10.com/4/8236017", "https://omg10.com/4/8247899", "https://omg10.com/4/8195375"];
const videos = [
    { title:"I CAN'T RESIST YOU", mp4:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://download.boldilocks.xyz/dl1", thumbnail:"https://veporn.com/wp-content/uploads/2026/02/after-outside-you-get-my-inside-(poster88).jpg", tags: ["wife", "sexy", "blonde"] },
    { title:"LETS PLUCK YOUR CHERRY", mp4:"https://zpi.cx/s4/Itrwoc4.mp4", download:"https://download.boldilocks.xyz/dl2", thumbnail:"https://veporn.com/wp-content/uploads/2026/02/lets-pluck-your-cherry-shall-we-(poster74).jpg", tags: ["blonde", "hot", "brunette"] },
    { title:"I REALLY MISS YOU", mp4:"https://cdn.veporn.com/im-here-to-let-the-sin-in-me.mp4", download:"https://download.boldilocks.xyz/dl3", thumbnail:"https://zpi.cx/b/7J52Vf.jpg", tags: ["shaved pussy", "Johnny Sins"] },
    { title:"REALLY WET", mp4:"https://cdn.veporn.com/you-want-me-dry-and-yet-im-wet.mp4", download:"https://download.boldilocks.xyz/dl4", thumbnail:"https://veporn.com/wp-content/uploads/2026/01/you-want-me-dry-and-yet-im-wet-(poster94).jpg", tags: ["big dick", "creampie"] },
    { title:"LET'S ENJOY THE MOMENT", mp4:"https://cdn.veporn.com/you-are-better-at-this-than-you-thought.mp4", download:"https://download.boldilocks.xyz/dl5", thumbnail:"https://veporn.com/wp-content/uploads/2026/01/you-are-better-at-this-than-you-thought-(poster57).jpg", tags: ["lesbians", "vibrator"] },
    { title:"STEP MOM IS IN HEAT", mp4:"https://cdn.save.moe/s12/ru3OE6W.mp4", download:"https://download.boldilocks.xyz/dl6", thumbnail:"https://zpi.cx/b/c2d8b.jpg", tags: ["mom", "step mom"] },
    { title:"CURE FOR MIGRAINES", mp4:"https://cdn.veporn.com/an-old-cure-for-migraines.mp4", download:"https://download.boldilocks.xyz/dl7", thumbnail:"https://veporn.com/wp-content/uploads/2026/03/an-old-cure-for-migraines-(poster7).jpg", tags: ["doctor", "cumshot"] },
    { title:"PUSSY POUNDED & CREAMPIED", mp4:"https://cdn.save.moe/s4/ldZJGb.mp4", download:"https://download.boldilocks.xyz/dl8", thumbnail:"https://zpi.cx/b/LKv1NiS.jpg", tags: ["hard sex", "creampie"] }
];

// State Management
let adCounter = localStorage.getItem('adCounter') || 0;
let currentVideoData = null;
let currentPage = 1;
let filteredVideos = [...videos];

// Ad Logic
function openAdTab() {
    window.open(adLinks[adCounter % adLinks.length], '_blank');
    adCounter = (Number(adCounter) + 1) % adLinks.length;
    localStorage.setItem('adCounter', adCounter);
}

// Search Logic
function toggleMobileSearch() { document.getElementById('mobileSearchBar').classList.toggle('active'); }
function desktopSearch() { performSearch(document.getElementById('searchInput').value); }
function mobileSearch() { performSearch(document.getElementById('mobileSearchInput').value); toggleMobileSearch(); }

function performSearch(term) {
    document.getElementById('player').style.display = 'none';
    document.getElementById('relatedSection').style.display = 'none';
    document.getElementById('videoGrid').classList.remove('hidden');
    document.getElementById('pagination').classList.remove('hidden');
    
    term = term.toLowerCase();
    filteredVideos = videos.filter(v => v.title.toLowerCase().includes(term) || v.tags.some(t => t.toLowerCase().includes(term)));
    currentPage = 1;
    renderGrid();
}

// Pagination Logic
function getItemsPerPage() { return window.innerWidth <= 768 ? 8 : 12; }

function renderGrid() {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    const itemsPerPage = getItemsPerPage();
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const paginatedItems = filteredVideos.slice(start, end);

    paginatedItems.forEach((v) => {
        grid.appendChild(createVideoCard(v, videos.indexOf(v)));
    });

    // Update Pagination UI
    document.getElementById('pageNumber').textContent = `Page ${currentPage}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
    document.getElementById('nextBtn').disabled = end >= filteredVideos.length;
}

function changePage(step) {
    currentPage += step;
    renderGrid();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Player Logic
function playVideo(index) {
    openAdTab();
    currentVideoData = videos[index];
    document.getElementById('player').style.display = 'block';
    document.getElementById('videoGrid').classList.add('hidden');
    document.getElementById('pagination').classList.add('hidden');

    let videoEl = document.getElementById('mainVideo');
    videoEl.src = ""; 
    videoEl.poster = currentVideoData.thumbnail;
    document.getElementById('startPlayBtn').style.display = 'flex';
    document.getElementById('playerTitle').textContent = currentVideoData.title;
    
    displayTags(currentVideoData.tags);
    displayRelated(currentVideoData);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function triggerActualPlay() {
    openAdTab();
    document.getElementById('startPlayBtn').style.display = 'none';
    let videoEl = document.getElementById('mainVideo');
    videoEl.src = currentVideoData.mp4;
    videoEl.play();
}

function handleDownloadClick() {
    openAdTab();
    window.location.href = currentVideoData.download;
}

// UI Helpers
function displayTags(tags) {
    let container = document.getElementById('tagsContainer');
    container.innerHTML = '';
    tags.forEach(t => {
        let s = document.createElement('span');
        s.className = 'tag';
        s.textContent = '#' + t;
        s.onclick = (e) => { e.stopPropagation(); performSearch(t); };
        container.appendChild(s);
    });
}

function displayRelated(current) {
    let grid = document.getElementById('relatedGrid');
    grid.innerHTML = '';
    let others = videos.filter(v => v !== current).slice(0, 4);
    others.forEach(v => grid.appendChild(createVideoCard(v, videos.indexOf(v))));
    document.getElementById('relatedSection').style.display = 'block';
}

function createVideoCard(video, index) {
    let div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<div class="thumb"><img src="${video.thumbnail}"></div><div class="title">${video.title}</div>`;
    div.onclick = () => playVideo(index);
    return div;
}

function goHome() { performSearch(''); }

window.onload = goHome;
window.onresize = renderGrid; // Re-calculate grid count on window resize
</script>
</body>
</html>
