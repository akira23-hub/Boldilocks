function initCarousel() {
    const carousel = document.getElementById('tagsCarousel');
    const allTags = [...new Set(videos.flatMap(v => v.tags))].sort();
    carousel.innerHTML = '<div class="carousel-tag" onclick="goHome(true)">All</div>';
    allTags.forEach(tag => {
        const div = document.createElement('div');
        div.className = 'carousel-tag';
        div.innerText = tag.charAt(0).toUpperCase() + tag.slice(1);
        div.onclick = () => performSearch(tag);
        carousel.appendChild(div);
    });
}

function scrollTags(dir) { document.getElementById('tagsCarousel').scrollLeft += dir * 200; }

function renderGrid(targetId, list, paginate = false) {
    const grid = document.getElementById(targetId);
    grid.innerHTML = '';
    let displayList = list;
    if (paginate) {
        const limit = window.innerWidth <= 768 ? 8 : 12;
        const start = (currentPage - 1) * limit;
        displayList = list.slice(start, start + limit);
        document.getElementById('pageNumber').textContent = `Page ${currentPage}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = (start + limit) >= list.length;
    }
    displayList.forEach(v => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="thumb-wrapper">
                <img src="${v.thumbnail}">
                <div class="duration-badge">${v.duration || "00:00"}</div>
            </div>
            <div class="title">${v.title}</div>
        `;
        card.onclick = () => { openAdTab(); window.location.hash = `#video/${v.id}`; };
        grid.appendChild(card);
    });
}

function stopMedia() {
    const v = document.getElementById('mainVideo');
    const f = document.getElementById('mainIframe');
    v.pause();
    v.src = "";
    v.load();
    f.src = "";
}

function handleRoute() {
    const hash = window.location.hash;
    document.getElementById('mobileSearchWrapper').classList.remove('active');
    stopMedia();

    if (hash.startsWith('#video/')) {
        const id = parseInt(hash.split('/')[1]);
        const video = videos.find(v => v.id === id);
        if (video) {
            DOWNLOAD_PAGE = video.download; 
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('player').style.display = 'block';
            document.getElementById('playerTitle').textContent = video.title;
            document.getElementById('startPlayBtn').style.display = 'flex';
            document.getElementById('mainVideo').style.display = 'none';
            document.getElementById('mainIframe').style.display = 'none';
            document.getElementById('playerContainer').style.backgroundImage = `url(${video.thumbnail})`;
            const tagsDiv = document.getElementById('tagsContainer');
            tagsDiv.innerHTML = '';
            video.tags.forEach(t => {
                const s = document.createElement('span'); s.className='tag-pill'; s.innerText='#'+t;
                s.onclick = () => performSearch(t); tagsDiv.appendChild(s);
            });
            const related = videos.filter(v => v.id !== id && v.tags.some(t => video.tags.includes(t))).slice(0, 4);
            renderGrid('relatedGrid', related.length > 0 ? related : videos.slice(0, 4));
            window.scrollTo(0,0);
        }
    } else {
        document.getElementById('player').style.display = 'none';
        document.getElementById('homeContent').style.display = 'block';
        const featured = videos.slice(-4).reverse();
        const featuredIds = featured.map(v => v.id);
        const remaining = filteredVideos.filter(v => !featuredIds.includes(v.id)).reverse();
        if (filteredVideos.length === videos.length) {
            document.getElementById('featuredSection').style.display = 'block';
            renderGrid('featuredGrid', featured);
            renderGrid('videoGrid', remaining, true);
        } else {
            document.getElementById('featuredSection').style.display = 'none';
            renderGrid('videoGrid', filteredVideos.slice().reverse(), true);
        }
    }
}

function triggerActualPlay() {
    openAdTab();
    const id = parseInt(window.location.hash.split('/')[1]);
    const video = videos.find(v => v.id === id);
    document.getElementById('startPlayBtn').style.display = 'none';
    document.getElementById('playerContainer').style.backgroundImage = 'none'; 
    if (video.mp4) { 
        const v = document.getElementById('mainVideo');
        v.style.display = 'block'; v.src = video.mp4; v.play(); 
    } else { 
        const f = document.getElementById('mainIframe');
        f.style.display = 'block'; f.src = video.embed + "?autoplay=1"; 
    }
}

function openAdTab() { window.open(adLinks[adCounter % adLinks.length], '_blank'); adCounter++; }

function performSearch(q) { 
    document.getElementById('mobileSearchWrapper').classList.remove('active');
    filteredVideos = videos.filter(v => v.title.toLowerCase().includes(q.toLowerCase()) || v.tags.some(t => t.toLowerCase().includes(q.toLowerCase()))); 
    currentPage = 1; 
    goHome(false); 
}

function goHome(reset = false) { 
    if(reset){ 
        filteredVideos=[...videos]; 
        document.getElementById('searchInput').value=""; 
        document.getElementById('mobileSearchInput').value="";
    } 
    document.getElementById('mobileSearchWrapper').classList.remove('active');
    currentPage=1; 
    history.pushState("", "", window.location.pathname); 
    handleRoute(); 
}

function handleDownloadClick() { if(DOWNLOAD_PAGE) { openAdTab(); window.location.href = DOWNLOAD_PAGE; } }
function changePage(step) { currentPage += step; window.scrollTo(0,0); handleRoute(); }
function toggleMobileSearch() { document.getElementById('mobileSearchWrapper').classList.toggle('active'); }
function desktopSearch() { performSearch(document.getElementById('searchInput').value); }
function mobileSearch() { performSearch(document.getElementById('mobileSearchInput').value); }

/* PROTECTION SCRIPTS */
// Disable right-click on the whole page
document.addEventListener('contextmenu', event => event.preventDefault());

// Disable common devtool shortcuts
document.onkeydown = function(e) {
    if(e.keyCode == 123) return false; // F12
    if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
    if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // View Source
};

window.addEventListener('hashchange', handleRoute);
window.onload = () => { initCarousel(); handleRoute(); };
