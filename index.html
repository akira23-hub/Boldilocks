/* Main container */
.main-container{
max-width:1200px;
width:100%;

padding:0 15px;

/* Menu bar styles */
.menu-bar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 0 15px 0;

margin-bottom:15px;

/* Logo */
.logo-img{

}

/* Desktop menu links */
.menu-links{

gap:30px;

.menu-links a{

cursor:pointer;

/* Search container */

height:36px;
font-size:18px;

align-items:center;
justify-content:center;

right:5px;

/* Mobile search container */

display:none;

border:none;

font-size:28px;

position:absolute;
left:0;
top:50%;

// Load play counts from localStorage
function loadPlayCounts(){
    let savedPlays = localStorage.getItem('videoPlays');
    if(savedPlays){
        let plays = JSON.parse(savedPlays);
        videos.forEach((video, index) => {
            if(plays[index] !== undefined){
                video.plays = plays[index];
            }
        });
    }
}

// Save play counts to localStorage
function savePlayCounts(){
    let plays = videos.map(v => v.plays);
    localStorage.setItem('videoPlays', JSON.stringify(plays));
}

// Increment play count for a video
function incrementPlayCount(index){
    if(index >= 0 && index < videos.length){
        videos[index].plays = (videos[index].plays || 0) + 1;
        savePlayCounts();
        
        // Update the display if the card exists
        let card = document.getElementById('card' + index);
        if(card){
            let countSpan = card.querySelector('.play-count');
            if(countSpan){
                countSpan.innerHTML = `▶ ${videos[index].plays}`;
            }
        }
    }
}

function displayTags(tags){
    let container = document.getElementById('tagsContainer');
    container.innerHTML = '';
    if(tags && tags.length > 0){
        tags.forEach(tag => {
            let tagSpan = document.createElement('span');
            tagSpan.className = 'tag';
            tagSpan.textContent = '#' + tag;
            container.appendChild(tagSpan);
        });
    }
}

// Function to get 6 random related videos based on tags
function getRelatedVideos(currentVideo, count = 6){
    if(!currentVideo) return [];
    
    // Get videos that share at least one tag with current video
    let related = videos.filter(v => 
        v !== currentVideo && // Exclude current video
        v.tags.some(tag => currentVideo.tags.includes(tag)) // Share at least one tag
    );
    
    // If not enough tag-related videos, add some random ones
    if(related.length < count){
        let otherVideos = videos.filter(v => 
            v !== currentVideo && !related.includes(v)
        );
        otherVideos = shuffleArray(otherVideos);
        related = [...related, ...otherVideos].slice(0, count);
    }
    
    return shuffleArray(related).slice(0, count);
}

// Shuffle array function
function shuffleArray(array){
    let newArray = [...array];
    for(let i = newArray.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

        card.className = 'related-card';

        thumbDiv.className = 'related-thumb';
        
        let vid = document.createElement('video');
        vid.muted = true;
        vid.playsInline = true;
        vid.preload = 'metadata';
        
        let source = document.createElement('source');
        source.src = video.url;
        source.type = 'video/mp4';
        vid.appendChild(source);

            let seekTime = video.seekTime || 10;
            if(this.duration >= seekTime){
                this.currentTime = seekTime;
            } else {
                this.currentTime = this.duration * 0.8;
            }
        };

            this.pause();
        };
        
        thumbDiv.appendChild(vid);
        
        // Footer with title and play count for related videos
        let footerDiv = document.createElement('div');
        footerDiv.className = 'related-card-footer';
        
        let titleDiv = document.createElement('div');
        titleDiv.className = 'related-title-text';
        titleDiv.textContent = video.title;
        
        let countSpan = document.createElement('div');
        countSpan.className = 'related-play-count';
        countSpan.innerHTML = `▶ ${video.plays || 0}`;
        
        footerDiv.appendChild(titleDiv);
        footerDiv.appendChild(countSpan);
        
        card.appendChild(thumbDiv);
        card.appendChild(footerDiv);
        
        let videoIndex = videos.findIndex(v => v.title === video.title && v.url === video.url);
        card.onclick = () => playVideo(videoIndex);
        
        relatedGrid.appendChild(card);
    });
}

function searchVideos(){
    let searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    
    if(searchTerm === ''){
        filteredVideos = [...videos];
    } else {
        filteredVideos = videos.filter(video => {
            let titleMatch = video.title.toLowerCase().includes(searchTerm);
            let tagMatch = video.tags.some(tag => tag.toLowerCase().includes(searchTerm));
            return titleMatch || tagMatch;
        });
    }
    
    currentPage = 1;
    updatePagination();
    displayCurrentPage();
}

function displayCurrentPage(){
    let grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    
    let start = (currentPage - 1) * itemsPerPage;
    let end = start + itemsPerPage;
    let pageVideos = filteredVideos.slice(start, end);
    
    if(pageVideos.length === 0){
        let noResults = document.createElement('div');
        noResults.className = 'no-results';
        noResults.textContent = 'No videos found';
        grid.appendChild(noResults);
    } else {
        pageVideos.forEach((video, index) => {
            grid.appendChild(createVideoCard(video, start + index));
        });
    }
    
    updatePageInfo();
}

function updatePagination(){
    let totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
    let prevBtn = document.getElementById('prevPage');
    let nextBtn = document.getElementById('nextPage');
    
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages || totalPages === 0;
}

function updatePageInfo(){
    let totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1}`;
}

function changePage(direction){
    let totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
    
    if(direction === 'next' && currentPage < totalPages){
        currentPage++;
    } else if(direction === 'prev' && currentPage > 1){
        currentPage--;
    }
    
    displayCurrentPage();
    updatePagination();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function createVideoCard(video, index){
    let card = document.createElement('div');
    card.className = 'card';
    card.id = 'card' + index;
    
    let thumbDiv = document.createElement('div');
    thumbDiv.className = 'thumb';
    
    let vid = document.createElement('video');
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = 'metadata';
    
    let source = document.createElement('source');
    source.src = video.url;
    source.type = 'video/mp4';
    vid.appendChild(source);
    
    vid.onloadedmetadata = function(){
        let seekTime = video.seekTime || 10;
        if(this.duration >= seekTime){
            this.currentTime = seekTime;
        } else {
            this.currentTime = this.duration * 0.8;
        }
    };
    
    vid.onseeked = function(){
        this.pause();
    };
    
    thumbDiv.appendChild(vid);
    
    // Footer with title and play count (simple white)
    let footerDiv = document.createElement('div');
    footerDiv.className = 'card-footer';
    
    let titleDiv = document.createElement('div');
    titleDiv.className = 'title';
    titleDiv.textContent = video.title;
    
    let countSpan = document.createElement('div');
    countSpan.className = 'play-count';
    countSpan.innerHTML = `▶ ${video.plays || 0}`;
    
    footerDiv.appendChild(titleDiv);
    footerDiv.appendChild(countSpan);
    
    card.appendChild(thumbDiv);
    card.appendChild(footerDiv);
    
    let videoIndex = videos.findIndex(v => v.title === video.title && v.url === video.url);
    card.onclick = () => playVideo(videoIndex);
    
    return card;
}

function playVideo(index){
    if(index === -1) return;
    
    if(currentCardId){
        document.getElementById(currentCardId)?.classList.remove('playing');
    }
    
    currentVideo = videos[index];
    currentCardId = 'card' + index;
    document.getElementById(currentCardId)?.classList.add('playing');
    
    // Increment play count
    incrementPlayCount(index);
    
    window.open(getNextAd(), '_blank');
    
    let player = document.getElementById('player');
    player.style.display = 'block';
    
    // Hide main grid and pagination
    document.getElementById('videoGrid').classList.add('hidden');
    document.getElementById('pagination').classList.add('hidden');
    
    displayTags(currentVideo.tags);
    
    let mainVideo = document.getElementById('mainVideo');
    mainVideo.src = currentVideo.url;
    mainVideo.play();
    
    // Update player info with title and play count
    document.getElementById('playerTitle').textContent = currentVideo.title;
    document.getElementById('playerPlayCount').innerHTML = `▶ ${currentVideo.plays}`;
    
    let downloadBtn = document.getElementById('downloadBtn');
    downloadBtn.href = currentVideo.download;
    
    // Get and display related videos (only 6)
    let relatedVideos = getRelatedVideos(currentVideo, 6);
    displayRelatedVideos(relatedVideos);
    document.getElementById('relatedSection').style.display = 'block';
    
    window.scrollTo({top: player.offsetTop, behavior:'smooth'});
    closeMenu();
}

function handleDownloadClick(e){
    e.preventDefault();
    window.open(getNextAd(), '_blank');
    setTimeout(() => window.location.href = currentVideo.download, 100);
}

function goHome(){
    document.getElementById('player').style.display = 'none';
    document.getElementById('relatedSection').style.display = 'none';
    document.getElementById('mainVideo').pause();
    
    // Show main grid and pagination again
    document.getElementById('videoGrid').classList.remove('hidden');
    document.getElementById('pagination').classList.remove('hidden');
    
    if(currentCardId){
        document.getElementById(currentCardId)?.classList.remove('playing');
    }
    
    document.getElementById('searchInput').value = '';
    document.getElementById('mobileSearchInput').value = '';
    document.getElementById('mobileSearchContainer').classList.remove('show');
    
    filteredVideos = [...videos];
    currentPage = 1;
    displayCurrentPage();
    updatePagination();
    
    window.scrollTo({top:0, behavior:'smooth'});
    closeMenu();
}

function handleMenuClick(menu){
    alert(menu.charAt(0).toUpperCase() + menu.slice(1) + ' page - add your content here');
}

// Update items per page on window resize
window.addEventListener('resize', function(){
    let newItemsPerPage = window.innerWidth <= 768 ? 10 : 12;
    if(newItemsPerPage !== itemsPerPage){
        itemsPerPage = newItemsPerPage;
        currentPage = 1;
        displayCurrentPage();
        updatePagination();
    }
});

document.getElementById('searchInput').addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        searchVideos();
    }
});

document.getElementById('mobileSearchInput').addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        mobileSearch();
    }
});

window.onload = function(){
    filteredVideos = [...videos];
    displayCurrentPage();
    updatePagination();
    document.querySelector('.logo-img').onclick = goHome;
};
</script>

</body>
</html>
