<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Video Gallery · Fixed</title>

<style>
body{
background:#000000;
font-family:Arial,sans-serif;
padding:10px;
color:#ffffff;
margin:0;
display:flex;
justify-content:center;
}

/* Main container */
.main-container{
max-width:1200px;
width:100%;
margin:0 auto;
padding:0 15px;
position:relative;
}

/* Menu bar styles */
.menu-bar{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 0 15px 0;
border-bottom:2px solid #ff00a8;
margin-bottom:15px;
position:relative;
min-height:70px;
}

/* Logo */
.logo-img{
height:70px;
width:auto;
cursor:pointer;
z-index:5;
}

/* Desktop menu links */
.menu-links{
display:flex;
gap:30px;
margin:0 25px;
}

.menu-links a{
color:#ffffff;
text-decoration:none;
font-size:16px;
cursor:pointer;
white-space:nowrap;
}

.menu-links a:hover{
color:#ff00a8;
}

/* Search container */
.search-container{
display:flex;
align-items:center;
position:relative;
}

#searchInput{
padding:8px 15px;
border-radius:20px;
border:2px solid #ff00a8;
background:#222;
color:white;
font-size:14px;
width:160px;
outline:none;
}

#searchInput::placeholder{
color:#999;
font-size:13px;
}

#searchBtn{
background:#ff00a8;
color:white;
border:none;
border-radius:20px;
padding:8px 15px;
margin-left:5px;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

/* Mobile search icon */
.mobile-search-icon{
display:none;
background:#ff00a8;
color:white;
border:none;
border-radius:50%;
width:36px;
height:36px;
font-size:18px;
cursor:pointer;
align-items:center;
justify-content:center;
position:absolute;
right:5px;
top:50%;
transform:translateY(-50%);
z-index:15;
}

/* Mobile search container */
.mobile-search-container{
display:none;
position:absolute;
top:80px;
left:10px;
right:10px;
background:#111111;
padding:10px;
border-radius:10px;
border:2px solid #ff00a8;
z-index:100;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.mobile-search-container.show{
display:flex;
}

.mobile-search-input{
flex:1;
padding:12px;
border-radius:25px 0 0 25px;
border:2px solid #ff00a8;
border-right:none;
background:#222;
color:white;
font-size:14px;
outline:none;
}

.mobile-search-btn{
background:#ff00a8;
color:white;
border:none;
border-radius:0 25px 25px 0;
padding:12px 20px;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

/* Hamburger icon */
.hamburger{
display:none;
font-size:28px;
color:#ff00a8;
cursor:pointer;
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
z-index:10;
}

/* Mobile styles */
@media (max-width: 768px) {
    .main-container{
        padding:0 5px;
    }
    
    .menu-bar{
        flex-wrap:wrap;
        padding:10px 0 5px 0;
        min-height:50px;
    }
    
    .hamburger{
        display:block;
        left:5px;
        font-size:28px;
    }
    
    .logo-img{
        height:50px;
        position:absolute;
        left:50%;
        transform:translateX(-50%);
        margin:0;
    }
    
    .search-container{
        display:none;
    }
    
    .mobile-search-icon{
        display:flex;
        width:40px;
        height:40px;
        font-size:20px;
    }
    
    .menu-links{
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:240px;
        height:100vh;
        background:#111111;
        flex-direction:column;
        padding:70px 15px 20px;
        z-index:100;
        border-right:2px solid #ff00a8;
        margin:0;
        gap:15px;
    }
    
    .menu-links a{
        font-size:16px;
        padding:8px 0;
    }
    
    .menu-links.show{
        display:flex;
    }
    
    .menu-overlay{
        display:none;
        position:fixed;
        top:0;
        left:0;
        right:0;
        bottom:0;
        background:rgba(0,0,0,0.7);
        z-index:90;
    }
    
    .menu-overlay.show{
        display:block;
    }
    
    .mobile-search-container{
        top:75px;
    }
}

@media (max-width: 480px) {
    .logo-img{
        height:45px;
    }
    
    .hamburger{
        font-size:26px;
    }
    
    .mobile-search-icon{
        width:38px;
        height:38px;
        font-size:18px;
    }
    
    .mobile-search-container{
        top:70px;
    }
}

#player{
display:none;
margin:15px 0;
text-align:center;
}

/* Tags container */
.tags-container{
margin-bottom:12px;
display:flex;
flex-wrap:wrap;
gap:5px;
justify-content:center;
}

.tag{
background:#ff00a8;
color:#ffffff;
padding:4px 10px;
border-radius:20px;
font-size:11px;
font-weight:bold;
letter-spacing:0.3px;
text-transform:uppercase;
}

#player video{
width:100%;
max-width:900px;
border-radius:6px;
}

/* Player info section */
.player-info{
display:flex;
justify-content:center;
align-items:center;
margin:10px 0 5px;
padding:0 5px;
}

.player-title{
font-size:18px;
font-weight:bold;
color:#ffffff;
}

.download-btn{
display:inline-block;
margin-top:12px;
padding:10px 25px;
background:#ff00a8;
color:white;
text-decoration:none;
border-radius:4px;
font-size:14px;
font-weight:bold;
cursor:pointer;
transition:background 0.2s;
border:none;
}

.download-btn:hover{
background:#cc0085;
}

/* Related videos section */
.related-section{
margin-top:30px;
margin-bottom:20px;
}

.related-title{
color:#ff00a8;
font-size:18px;
font-weight:bold;
margin-bottom:15px;
text-align:left;
border-left:4px solid #ff00a8;
padding-left:10px;
}

.related-grid{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:15px;
}

/* Mobile - 2 columns */
@media (max-width: 768px) {
    .related-grid{
        grid-template-columns:repeat(2, 1fr);
        gap:12px;
    }
}

/* Small mobile - still 2 columns */
@media (max-width: 480px) {
    .related-grid{
        grid-template-columns:repeat(2, 1fr);
        gap:10px;
    }
}

.related-card{
cursor:pointer;
transition:transform 0.1s;
}

.related-card:hover{
transform:scale(1.02);
}

.related-thumb{
position:relative;
overflow:hidden;
border-radius:6px;
background:#111;
aspect-ratio:16/9;
}

.related-thumb img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.related-title-text{
font-size:13px;
font-weight:bold;
color:#ffffff;
margin-top:5px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
text-align:center;
}

/* Main grid */
.grid{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:20px;
margin-top:20px;
}

/* Hide grid when playing */
.grid.hidden{
display:none;
}

/* Tablet */
@media (max-width: 1000px) {
    .grid{
        grid-template-columns:repeat(3, 1fr);
        gap:15px;
    }
}

/* Mobile - 2 columns */
@media (max-width: 768px) {
    .grid{
        grid-template-columns:repeat(2, 1fr);
        gap:12px;
        margin-top:15px;
    }
}

/* Small mobile */
@media (max-width: 480px) {
    .grid{
        grid-template-columns:repeat(2, 1fr);
        gap:8px;
    }
}

.card{
cursor:pointer;
width:100%;
transition:transform 0.1s;
}

.card:hover{
transform:scale(1.02);
}

.thumb{
position:relative;
overflow:hidden;
border-radius:6px;
background:#111;
aspect-ratio:16/9;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.title{
text-align:center;
margin-top:5px;
font-size:13px;
font-weight:bold;
color:#ffffff;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
padding:0 2px;
}

.card.playing{
display:none;
}

.no-results{
text-align:center;
padding:30px;
color:#ff00a8;
font-size:16px;
grid-column:1/-1;
}

/* Pagination styles */
.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin:30px 0 20px;
flex-wrap:wrap;
}

/* Hide pagination when playing */
.pagination.hidden{
display:none;
}

.page-btn{
background:#222;
color:#ff00a8;
border:2px solid #ff00a8;
padding:8px 16px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:all 0.2s;
}

.page-btn:hover{
background:#ff00a8;
color:white;
}

.page-btn.active{
background:#ff00a8;
color:white;
}

.page-btn:disabled{
opacity:0.5;
cursor:not-allowed;
background:#222;
color:#ff00a8;
}

.page-info{
color:#ff00a8;
font-size:14px;
margin:0 10px;
}

@media (max-width: 768px) {
    .page-btn{
        padding:6px 12px;
        font-size:13px;
    }
}

@media (max-width: 480px) {
    .pagination{
        gap:5px;
    }
    .page-btn{
        padding:5px 10px;
        font-size:12px;
    }
}

@media (max-width:600px){
.tag{
padding:3px 8px;
font-size:10px;
}
}
</style>
</head>

<body>
<div class="main-container">
<!-- Menu overlay for mobile -->
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

<div class="menu-bar">
<!-- Hamburger icon for mobile -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<!-- Logo -->
<img src="https://zpi.cx/b/uiDMr.png" class="logo-img" onclick="goHome()">

<!-- Menu links (desktop) -->
<div class="menu-links" id="menuLinks">
<a href="#" onclick="goHome(); closeMenu(); return false;">Home</a>
<a href="#" onclick="handleMenuClick('trending'); closeMenu(); return false;">Trending</a>
<a href="#" onclick="handleMenuClick('latest'); closeMenu(); return false;">Latest</a>
</div>

<!-- Desktop search bar -->
<div class="search-container">
<input type="text" id="searchInput" placeholder="Search...">
<button id="searchBtn" onclick="searchVideos()">🔍</button>

</div>

<div id="player">
<!-- Tags container -->

<video id="mainVideo" controls></video>
<!-- Player info with title only -->

<div class="player-title" id="playerTitle"></div>
</div>
<a href="#" id="downloadBtn" class="download-btn" onclick="handleDownloadClick(event)">⬇ DOWNLOAD</a>
</div>

<!-- Related videos section (hidden by default) -->
<div id="relatedSection" class="related-section" style="display:none;">
<div class="related-title">Related Videos</div>
<div class="related-grid" id="relatedGrid"></div>
</div>

<!-- Main video grid -->
<div class="grid" id="videoGrid"></div>

<!-- Pagination -->
<div class="pagination" id="pagination">
<button class="page-btn" id="prevPage" onclick="changePage('prev')" disabled>Previous</button>
<span class="page-info" id="pageInfo">Page 1</span>
<button class="page-btn" id="nextPage" onclick="changePage('next')">Next</button>
</div>

</div>

<script>
const adLinks = [
    "https://omg10.com/4/8251888", "https://omg10.com/4/7512585", "https://omg10.com/4/8257954",
    "https://omg10.com/4/1415254", "https://omg10.com/4/7512545", "https://omg10.com/4/8198889",
    "https://omg10.com/4/8236017", "https://omg10.com/4/8247899", "https://omg10.com/4/8195375"

// ===== VIDEOS LIST WITH IMAGE THUMBNAILS =====
const videos = [
    {
        title:"I CAN'T RESIST YOU",

        tags: ["blonde", "cherry", "sweet"]
    },
    {
        title:"NEON", 
        url:"https://zpi.cx/s4/2EeZajd.mp4", 
        download:"https://download.boldilocks.xyz/dl6", 
        thumbnail:"https://via.placeholder.com/400x225/ff80bf/ffffff?text=NEON",
        tags: ["neon", "party", "sexy"]
    },
    {
        title:"PURPLE", 
        url:"https://zpi.cx/s4/2EeZajd.mp4", 
        download:"https://download.boldilocks.xyz/dl7", 
        thumbnail:"https://via.placeholder.com/400x225/990063/ffffff?text=PURPLE",
        tags: ["purple", "wife", "dress"]
    },
    {
        title:"VELVET", 
        url:"https://zpi.cx/s4/2EeZajd.mp4", 
        download:"https://download.boldilocks.xyz/dl8", 
        thumbnail:"https://via.placeholder.com/400x225/b3006b/ffffff?text=VELVET",
        tags: ["velvet", "blonde", "luxury"]
    }
];

let adCounter = localStorage.getItem('adCounter') || 0;
let currentVideo = null;
let currentCardId = null;
let currentPage = 1;
let itemsPerPage = window.innerWidth <= 768 ? 10 : 12;
let filteredVideos = [...videos];

// Function to close player (go home)
function closePlayer(){
    document.getElementById('player').style.display = 'none';
    document.getElementById('relatedSection').style.display = 'none';
    document.getElementById('mainVideo').pause();
    
    if(currentCardId){
        document.getElementById(currentCardId)?.classList.remove('playing');
    }
    currentCardId = null;
}

function toggleMenu(){
    document.getElementById('menuLinks').classList.toggle('show');
    document.getElementById('menuOverlay').classList.toggle('show');
}

function closeMenu(){
    document.getElementById('menuLinks').classList.remove('show');
    document.getElementById('menuOverlay').classList.remove('show');
}

function toggleMobileSearch(){
    let container = document.getElementById('mobileSearchContainer');
    container.classList.toggle('show');
    if(container.classList.contains('show')){
        document.getElementById('mobileSearchInput').focus();
    }
}

function mobileSearch(){
    let searchTerm = document.getElementById('mobileSearchInput').value;
    document.getElementById('searchInput').value = searchTerm;
    performSearch(searchTerm);
    document.getElementById('mobileSearchContainer').classList.remove('show');
}

function getNextAd(){
    let link = adLinks[adCounter % adLinks.length];
    adCounter = (Number(adCounter) + 1) % adLinks.length;
    localStorage.setItem('adCounter', adCounter);
    return link;
}

function displayTags(tags){
    let container = document.getElementById('tagsContainer');
    container.innerHTML = '';
    if(tags && tags.length > 0){
        tags.forEach(tag => {
            let tagSpan = document.createElement('span');
            tagSpan.className = 'tag';
            tagSpan.textContent = '#' + tag;
            container.appendChild(tagSpan);
        });
    }
}

// Function to get EXACTLY 4 random related videos
function getRelatedVideos(currentVideo){
    if(!currentVideo) return [];
    
    // Get all other videos
    let otherVideos = videos.filter(v => v !== currentVideo);
    
    // Shuffle them
    for(let i = otherVideos.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [otherVideos[i], otherVideos[j]] = [otherVideos[j], otherVideos[i]];
    }
    
    // Return ONLY 4
    return otherVideos.slice(0, 4);
}

// Display related videos with IMAGE thumbnails
function displayRelatedVideos(relatedVideos){
    let relatedGrid = document.getElementById('relatedGrid');
    relatedGrid.innerHTML = '';
    
    // 🔥 FORCE ONLY 4 VIDEOS - GUARANTEED 🔥
    let videosToShow = relatedVideos.slice(0, 4);
    
    videosToShow.forEach((video, index) => {
        let card = document.createElement('div');
        card.className = 'related-card';
        
        let thumbDiv = document.createElement('div');
        thumbDiv.className = 'related-thumb';
        
        // USE IMAGE instead of VIDEO
        let img = document.createElement('img');
        img.src = video.thumbnail;
        img.alt = video.title;
        thumbDiv.appendChild(img);
        
        let titleDiv = document.createElement('div');
        titleDiv.className = 'related-title-text';
        titleDiv.textContent = video.title;
        
        card.appendChild(thumbDiv);
        card.appendChild(titleDiv);
        
        let videoIndex = videos.findIndex(v => v.title === video.title && v.url === video.url);
        card.onclick = () => playVideo(videoIndex);
        
        relatedGrid.appendChild(card);
    });
}

// SEARCH FUNCTION
function performSearch(searchTerm){
    closePlayer();
    
    searchTerm = searchTerm.toLowerCase().trim();
    
    if(searchTerm === ''){
        filteredVideos = [...videos];
    } else {
        filteredVideos = videos.filter(video => {
            let titleMatch = video.title.toLowerCase().includes(searchTerm);
            let tagMatch = video.tags.some(tag => tag.toLowerCase().includes(searchTerm));
            return titleMatch || tagMatch;
        });
    }
    
    currentPage = 1;
    updatePagination();
    displayCurrentPage();
}

function searchVideos(){
    let searchTerm = document.getElementById('searchInput').value;
    performSearch(searchTerm);
}

function displayCurrentPage(){
    let grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    
    let start = (currentPage - 1) * itemsPerPage;
    let end = start + itemsPerPage;
    let pageVideos = filteredVideos.slice(start, end);
    
    if(pageVideos.length === 0){
        let noResults = document.createElement('div');
        noResults.className = 'no-results';
        noResults.textContent = 'No videos found';
        grid.appendChild(noResults);
    } else {
        pageVideos.forEach((video, index) => {
            grid.appendChild(createVideoCard(video, start + index));
        });
    }
    
    updatePageInfo();
}

function updatePagination(){
    let totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
    let prevBtn = document.getElementById('prevPage');
    let nextBtn = document.getElementById('nextPage');
    
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages || totalPages === 0;
}

function updatePageInfo(){
    let totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
    document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1}`;
}

function changePage(direction){
    let totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
    
    if(direction === 'next' && currentPage < totalPages){
        currentPage++;
    } else if(direction === 'prev' && currentPage > 1){
        currentPage--;
    }
    
    displayCurrentPage();
    updatePagination();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

// Create video card with IMAGE thumbnail
function createVideoCard(video, index){
    let card = document.createElement('div');
    card.className = 'card';
    card.id = 'card' + index;
    
    let thumbDiv = document.createElement('div');
    thumbDiv.className = 'thumb';
    
    let img = document.createElement('img');
    img.src = video.thumbnail;
    img.alt = video.title;
    thumbDiv.appendChild(img);
    
    let titleDiv = document.createElement('div');
    titleDiv.className = 'title';
    titleDiv.textContent = video.title;
    
    card.appendChild(thumbDiv);
    card.appendChild(titleDiv);
    
    let videoIndex = videos.findIndex(v => v.title === video.title && v.url === video.url);
    card.onclick = () => playVideo(videoIndex);
    
    return card;
}

function playVideo(index){
    if(index === -1) return;
    
    if(currentCardId){
        document.getElementById(currentCardId)?.classList.remove('playing');
    }
    
    currentVideo = videos[index];
    currentCardId = 'card' + index;
    document.getElementById(currentCardId)?.classList.add('playing');
    
    window.open(getNextAd(), '_blank');
    
    let player = document.getElementById('player');
    player.style.display = 'block';
    
    // Hide main grid and pagination
    document.getElementById('videoGrid').classList.add('hidden');
    document.getElementById('pagination').classList.add('hidden');
    
    displayTags(currentVideo.tags);
    
    let mainVideo = document.getElementById('mainVideo');
    mainVideo.src = currentVideo.url;
    mainVideo.play();
    
    document.getElementById('playerTitle').textContent = currentVideo.title;
    
    let downloadBtn = document.getElementById('downloadBtn');
    downloadBtn.href = currentVideo.download;
    
    // Get and display EXACTLY 4 related videos
    let relatedVideos = getRelatedVideos(currentVideo);
    displayRelatedVideos(relatedVideos);
    document.getElementById('relatedSection').style.display = 'block';
    
    window.scrollTo({top: player.offsetTop, behavior:'smooth'});
    closeMenu();
}

function handleDownloadClick(e){
    e.preventDefault();
    window.open(getNextAd(), '_blank');
    setTimeout(() => window.location.href = currentVideo.download, 100);
}

// ===== FIXED HOME FUNCTION =====
function goHome(){
    // Hide player
    document.getElementById('player').style.display = 'none';
    document.getElementById('relatedSection').style.display = 'none';
    document.getElementById('mainVideo').pause();
    
    // Show main grid and pagination
    document.getElementById('videoGrid').classList.remove('hidden');
    document.getElementById('pagination').classList.remove('hidden');
    
    // Remove playing class from current card
    if(currentCardId){
        document.getElementById(currentCardId)?.classList.remove('playing');
    }
    currentCardId = null;
    currentVideo = null;
    
    // Clear search inputs
    document.getElementById('searchInput').value = '';
    document.getElementById('mobileSearchInput').value = '';
    document.getElementById('mobileSearchContainer').classList.remove('show');
    
    // Reset to all videos
    filteredVideos = [...videos];
    currentPage = 1;
    displayCurrentPage();
    updatePagination();
    
    // Scroll to top
    window.scrollTo({top: 0, behavior: 'smooth'});
    
    // Close mobile menu
    closeMenu();
}

function handleMenuClick(menu){
    alert(menu.charAt(0).toUpperCase() + menu.slice(1) + ' page - add your content here');
}

window.addEventListener('resize', function(){
    let newItemsPerPage = window.innerWidth <= 768 ? 10 : 12;
    if(newItemsPerPage !== itemsPerPage){
        itemsPerPage = newItemsPerPage;
        currentPage = 1;
        displayCurrentPage();
        updatePagination();
    }
});

document.getElementById('searchInput').addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        searchVideos();
    }
});

document.getElementById('mobileSearchInput').addEventListener('keypress', function(e){
    if(e.key === 'Enter'){
        mobileSearch();
    }
});

window.onload = function(){
    filteredVideos = [...videos];
    displayCurrentPage();
    updatePagination();
    document.querySelector('.logo-img').onclick = goHome;
};
</script>

</body>
</html>
