<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boldilocks | Premium Streaming</title>
    <style>
        :root {
            --primary: #e91e63;
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #aaaaaa;
            --transition: 0.3s ease-in-out;
        }
        body { 
            background: var(--bg-dark); 
            font-family: 'Segoe UI', sans-serif; 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 50px; 
            overflow-x: hidden;
        }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
                
        /* Header & Nav */
        .menu-bar { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 0; border-bottom: 1px solid #222; margin-bottom: 20px; 
        }
        .logo-img { height: 60px; cursor: pointer; }
        .menu-links { display: flex; gap: 25px; align-items: center; }
        .menu-links a { color: var(--text-dim); text-decoration: none; font-size: 15px; font-weight: 600; cursor: pointer; }
        
        /* Search Containers with Clear Button */
        .search-container { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 20px; 
            padding: 5px 15px; display: flex; align-items: center; gap: 5px;
        }
        #searchInput { background: transparent; border: none; color: white; outline: none; width: 150px; }
        .clear-btn { color: var(--text-dim); cursor: pointer; font-weight: bold; font-size: 18px; user-select: none; }
        .clear-btn:hover { color: var(--primary); }

        /* Mobile Controls */
        .mobile-actions { display: none; gap: 15px; }
        .icon-btn { font-size: 24px; cursor: pointer; color: var(--primary); }
        
        #mobileSearchWrapper { 
            display: none; background: #1a1a1a; padding: 6px 10px; 
            border-bottom: 2px solid var(--primary); width: 100%; box-sizing: border-box;
        }
        #mobileSearchWrapper.active { display: flex; align-items: center; gap: 10px; }
        #mobileSearchInput { 
            flex: 1; padding: 6px; background: #222; border: none; 
            color: white; border-radius: 4px; font-size: 14px;
        }
        
        #mobileMenuOverlay {
            position: fixed; top: 0; right: -100%; width: 30%; height: 100%;
            background: rgba(15, 15, 15, 0.98); z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: flex-start; 
            padding-top: 80px; gap: 20px; transition: 0.4s;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        #mobileMenuOverlay.active { right: 0; }
        #mobileMenuOverlay a { font-size: 16px; color: white; text-decoration: none; font-weight: bold; text-transform: uppercase; }

        /* Player */
        #player { display: none; margin-bottom: 40px; }
        .video-wrapper { 
            position: relative; width: 100%; aspect-ratio: 16/9; background: #000; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            background-size: cover; background-position: center;
        }
        #mainVideo, #mainIframe { width: 100%; height: 100%; border: none; background: #000; }
        
        .play-overlay-btn { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: var(--primary); color: white; border: none; border-radius: 50%; 
            width: 80px; height: 80px; font-size: 30px; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
        }

        .download-btn {
            display: inline-block; padding: 12px 30px; background: var(--primary); 
            color: white; border-radius: 4px; cursor: pointer; font-weight: bold; 
            margin: 15px 5px; text-decoration: none;
        }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { cursor: pointer; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; margin-bottom: 6px; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .title { font-size: 14px; color: #eee; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .tag { display: inline-block; background: #252525; color: var(--text-dim); padding: 6px 14px; border-radius: 4px; font-size: 13px; margin: 5px 5px 0 0; cursor: pointer; border: 1px solid #333; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 40px 0; }
        .page-btn { background: #1a1a1a; color: white; border: 1px solid #333; padding: 10px 25px; border-radius: 4px; cursor: pointer; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        @media (max-width: 768px) {
            .menu-links, .search-container { display: none; }
            .mobile-actions { display: flex; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .logo-img { height: 45px; }
            .play-overlay-btn { width: 38px !important; height: 38px !important; font-size: 14px !important; }
            #mobileMenuOverlay { width: 70%; } 
            .download-btn { padding: 8px 15px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="mobileMenuOverlay">
    <div onclick="toggleMobileMenu()" style="position:absolute; top:20px; right:20px; font-size:30px; color:var(--primary);">×</div>
    <a onclick="goHome(true); toggleMobileMenu()">Home</a>
    <a href="#">Trending</a>
</div>

<div class="main-container">
    <div class="menu-bar">
        <img src="https://zpi.cx/b/PS3BgJ5.png" class="logo-img" onclick="goHome(true)">
        <div class="menu-links">
            <a onclick="goHome(true)">Home</a>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') desktopSearch()">
                <span class="clear-btn" onclick="clearSearch('searchInput')">×</span>
            </div>
        </div>
        <div class="mobile-actions">
            <div class="icon-btn" onclick="toggleMobileSearch()">🔍</div>
            <div class="icon-btn" onclick="toggleMobileMenu()">☰</div>
        </div>
    </div>
    
    <div id="mobileSearchWrapper">
        <input type="text" id="mobileSearchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') mobileSearch()">
        <span class="clear-btn" onclick="clearSearch('mobileSearchInput')">×</span>
    </div>

    <div id="player">
        <div class="video-wrapper" id="v-wrap">
            <button id="startPlayBtn" class="play-overlay-btn" onclick="triggerActualPlay()">▶</button>
            <video id="mainVideo" controls playsinline></video>
            <iframe id="mainIframe" style="display:none" allowfullscreen></iframe>
        </div>
        <h1 id="playerTitle" style="font-size: 20px; margin-top: 15px;"></h1>
        <div id="tagsContainer"></div>
        
        <div id="downloadBtn" class="download-btn" onclick="handleDownloadClick()">⬇ DOWNLOAD</div>

        <div style="color:var(--primary); font-weight:bold; margin-top:30px; margin-bottom:15px;">Related Videos</div>
        <div id="relatedGrid" class="grid"></div>
    </div>

    <div id="videoGrid" class="grid"></div>
    <div id="pagination" class="pagination">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">Prev</button>
        <span id="pageNumber">Page 1</span>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</div>

<script>
const adLinks = ["https://omg10.com/4/8251888", "https://omg10.com/4/7512585", "https://omg10.com/4/8257954", "https://omg10.com/4/1415254", "https://omg10.com/4/7512545", "https://omg10.com/4/8198889", "https://omg10.com/4/8236017", "https://omg10.com/4/8247899", "https://omg10.com/4/8195375"];
let adCounter = 0;
let DOWNLOAD_PAGE = ""; 

function openAdTab() {
    window.open(adLinks[adCounter % adLinks.length], '_blank');
    adCounter++;
}

function handleDownloadClick() {
    if (DOWNLOAD_PAGE !== "") {
        openAdTab(); 
        window.location.href = DOWNLOAD_PAGE; 
    }
}

const videos = [
    { id: 0, title:"I can't resist you", mp4:"https://zpi.cx/s4/2EeZajd.mp4", download:"https://download.boldilocks.xyz/dl1", thumbnail:"https://zpi.cx/b/hOW88T.jpg", tags: ["wife", "sexy", "hot wife"] },
    { id: 1, title:"Lets pluck your cherry", mp4:"https://zpi.cx/s4/Itrwoc4.mp4", download:"https://download.boldilocks.xyz/dl2", thumbnail:"https://zpi.cx/b/fGSLT5U.png", tags: ["blonde", "hot", "defloration"] },
    { id: 2, title:"I really miss you", mp4:"https://cdn.veporn.com/im-here-to-let-the-sin-in-me.mp4", download:"https://download.boldilocks.xyz/dl3", thumbnail:"https://zpi.cx/b/7z07poS.png", tags: ["shaved", "sins","hardsex"] },
    { id: 3, title:"Really wet", mp4:"https://cdn.veporn.com/you-want-me-dry-and-yet-im-wet.mp4", download:"https://download.boldilocks.xyz/dl4", thumbnail:"https://zpi.cx/b/IABMG.png", tags: ["creampie", "wet"] },
    { id: 4, title:"Let's enjoy the moment", mp4:"https://cdn.veporn.com/you-are-better-at-this-than-you-thought.mp4", download:"https://download.boldilocks.xyz/dl5", thumbnail:"https://zpi.cx/b/56F4bA4.png", tags: ["lesbians"] },
    { id: 5, title:"Step Mom is in heat", mp4:"https://cdn.save.moe/s12/ru3OE6W.mp4", download:"https://download.boldilocks.xyz/dl6", thumbnail:"https://zpi.cx/b/c2d8b.jpg", tags: ["mom", "stepmom"] },
    { id: 6, title:"Cure for migraines", mp4:"https://cdn.veporn.com/an-old-cure-for-migraines.mp4", download:"https://download.boldilocks.xyz/dl7", thumbnail:"https://zpi.cx/b/SQGSD6.png", tags: ["doctor", "nurse"] },
    { id: 7, title:"Pussy Pounded & Creampied", mp4:"https://cdn.save.moe/s4/ldZJGb.mp4", download:"https://download.boldilocks.xyz/dl8", thumbnail:"https://zpi.cx/b/LKv1NiS.jpg", tags: ["hardsex", "creampie"] },
    { id: 8, title:"Celine Umali Pinay", embed:"https://sendvid.com/embed/b0tura79", download:"https://download.boldilocks.xyz/dl9", thumbnail:"https://zpi.cx/b/11Fzu.jpg", tags: ["pinay", "asia"] }
];

let filteredVideos = [...videos];
let currentPage = 1;

function renderGrid(targetId, list, paginate = false) {
    const grid = document.getElementById(targetId);
    grid.innerHTML = '';
    let displayList = list;
    if (paginate) {
        const limit = window.innerWidth <= 768 ? 8 : 12;
        const start = (currentPage - 1) * limit;
        const end = start + limit;
        displayList = list.slice(start, end);
        document.getElementById('pageNumber').textContent = `Page ${currentPage}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = end >= list.length;
    }
    displayList.forEach(v => {
        let card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="thumb"><img src="${v.thumbnail}"></div><div class="title">${v.title}</div>`;
        card.onclick = () => { openAdTab(); window.location.hash = `#video/${v.id}`; };
        grid.appendChild(card);
    });
}

function handleRoute() {
    document.getElementById('mobileSearchWrapper').classList.remove('active');
    const hash = window.location.hash;
    if (hash.startsWith('#video/')) {
        const id = parseInt(hash.split('/')[1]);
        const video = videos.find(v => v.id === id);
        if (video) {
            DOWNLOAD_PAGE = video.download; 
            const mainVideo = document.getElementById('mainVideo');
            const mainIframe = document.getElementById('mainIframe');
            const wrapper = document.getElementById('v-wrap');
            
            document.getElementById('videoGrid').style.display = 'none';
            document.getElementById('pagination').style.display = 'none';
            document.getElementById('player').style.display = 'block';
            document.getElementById('playerTitle').textContent = video.title;
            document.getElementById('startPlayBtn').style.display = 'flex';

            wrapper.style.backgroundImage = `url(${video.thumbnail})`;
            
            if (video.mp4) {
                mainVideo.style.display = 'block';
                mainIframe.style.display = 'none';
                mainVideo.src = ""; 
                mainVideo.poster = video.thumbnail; 
            } else {
                mainVideo.style.display = 'none';
                mainIframe.style.display = 'none'; 
                mainIframe.src = ""; 
            }
            const tagsDiv = document.getElementById('tagsContainer');
            tagsDiv.innerHTML = '';
            video.tags?.forEach(t => {
                const s = document.createElement('span'); s.className='tag'; s.innerText='#'+t;
                s.onclick = () => performSearch(t); tagsDiv.appendChild(s);
            });

            // RELATED LOGIC: Filter by tags or title keywords
            const related = videos.filter(v => 
                v.id !== id && 
                (v.tags.some(t => video.tags.includes(t)) || v.title.toLowerCase().split(' ').some(w => video.title.toLowerCase().includes(w)))
            ).slice(0, 4);
            
            renderGrid('relatedGrid', related.length > 0 ? related : videos.filter(v => v.id !== id).slice(0, 4));
            window.scrollTo(0,0);
        }
    } else {
        document.getElementById('player').style.display = 'none';
        document.getElementById('videoGrid').style.display = 'grid';
        document.getElementById('pagination').style.display = 'flex';
        renderGrid('videoGrid', filteredVideos, true);
    }
}

function triggerActualPlay() {
    openAdTab();
    const id = parseInt(window.location.hash.split('/')[1]);
    const video = videos.find(v => v.id === id);
    const wrapper = document.getElementById('v-wrap');
    document.getElementById('startPlayBtn').style.display = 'none';
    wrapper.style.backgroundImage = 'none'; 
    if (video.mp4) {
        document.getElementById('mainVideo').src = video.mp4;
        document.getElementById('mainVideo').play();
    } else {
        document.getElementById('mainIframe').style.display = 'block';
        document.getElementById('mainIframe').src = video.embed + "?autoplay=1";
    }
}

function performSearch(q) {
    const query = q.toLowerCase();
    filteredVideos = videos.filter(v => 
        v.title.toLowerCase().includes(query) || v.tags.some(tag => tag.toLowerCase().includes(query))
    );
    currentPage = 1; 
    goHome(false); 
}

function clearSearch(id) {
    document.getElementById(id).value = "";
    goHome(true);
}

function changePage(step) { currentPage += step; window.scrollTo(0,0); renderGrid('videoGrid', filteredVideos, true); }
function toggleMobileMenu() { document.getElementById('mobileMenuOverlay').classList.toggle('active'); }
function toggleMobileSearch() { document.getElementById('mobileSearchWrapper').classList.toggle('active'); }
function desktopSearch() { performSearch(document.getElementById('searchInput').value); }
function mobileSearch() { performSearch(document.getElementById('mobileSearchInput').value); toggleMobileSearch(); }

function goHome(resetFilter = false) { 
    document.getElementById('mobileSearchWrapper').classList.remove('active');
    if (resetFilter) {
        filteredVideos = [...videos];
        document.getElementById('searchInput').value = "";
        document.getElementById('mobileSearchInput').value = "";
    }
    currentPage = 1; 
    if (window.location.hash !== "") {
        history.pushState("", document.title, window.location.pathname + window.location.search);
    }
    document.getElementById('player').style.display = 'none';
    document.getElementById('videoGrid').style.display = 'grid';
    document.getElementById('pagination').style.display = 'flex';
    const v = document.getElementById('mainVideo');
    v.pause(); v.src = "";
    document.getElementById('mainIframe').src = "";
    renderGrid('videoGrid', filteredVideos, true);
}

window.addEventListener('hashchange', handleRoute);
window.onload = handleRoute;
</script>
</body>
</html>
