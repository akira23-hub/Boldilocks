function updatePageInfo() {
  let totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
  document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1}`;
}

function changePage(direction) {
  let totalPages = Math.ceil(filteredVideos.length / itemsPerPage);
  if (direction === 'next' && currentPage < totalPages) {
    currentPage++;
  } else if (direction === 'prev' && currentPage > 1) {
    currentPage--;
  }
  displayCurrentPage();
  updatePagination();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function createVideoCard(video, index) {
  let card = document.createElement('div');
  card.className = 'card';
  card.id = 'card' + index;

  let thumbDiv = document.createElement('div');
  thumbDiv.className = 'thumb';

  let img = document.createElement('img');
  img.src = video.thumbnail;
  img.alt = video.title;
  thumbDiv.appendChild(img);

  let titleDiv = document.createElement('div');
  titleDiv.className = 'title';
  titleDiv.textContent = video.title;

  card.appendChild(thumbDiv);
  card.appendChild(titleDiv);

  let videoIndex = videos.findIndex((v) => v.title === video.title);
  card.onclick = () => playVideo(videoIndex);

  return card;
}

// Updated playVideo function:
function playVideo(index) {
  if (index === -1) return;

  if (currentCardId) {
    document.getElementById(currentCardId)?.classList.remove('playing');
  }

  currentVideo = videos[index];
  currentCardId = 'card' + index;
  document.getElementById(currentCardId)?.classList.add('playing');

  // Update URL hash with video title
  window.history.pushState({}, '', `#video=${encodeURIComponent(currentVideo.title)}`);
  
  // Set the page title to current video title
  document.title = currentVideo.title;

  // Open ad in new tab
  window.open(getNextAd(), '_blank');

  let player = document.getElementById('player');
  let videoEl = document.getElementById('mainVideo');
  let iframeEl = document.getElementById('mainIframe');

  // Reset players
  videoEl.style.display = 'none';
  iframeEl.style.display = 'none';
  videoEl.pause();
  videoEl.src = '';
  iframeEl.src = '';

  // Show the player container
  player.style.display = 'block';

  // Hide main grid and pagination when playing
  document.getElementById('videoGrid').classList.add('hidden');
  document.getElementById('pagination').classList.add('hidden');

  displayTags(currentVideo.tags);
  document.getElementById('playerTitle').textContent = currentVideo.title;
  document.getElementById('downloadBtn').href = currentVideo.download;

  // Play MP4 if available
  if (currentVideo.mp4 && currentVideo.mp4.trim() !== '') {
    console.log('Attempting to play MP4:', currentVideo.mp4);
    // Remove muted to allow sound
    // videoEl.muted = true;
    videoEl.src = currentVideo.mp4;
    videoEl.style.display = 'block';

    // Play the video and handle promise
    videoEl.play().then(() => {
      // Optionally, unmute here if it was muted before
      // videoEl.muted = false;
    }).catch(error => {
      console.log('MP4 play failed:', error);
      // fallback to embed if MP4 fails
      if (currentVideo.embed && currentVideo.embed.trim() !== '') {
        iframeEl.src = currentVideo.embed;
        iframeEl.style.display = 'block';
      }
    });
  } else if (currentVideo.embed && currentVideo.embed.trim() !== '') {
    console.log('No MP4, using embed:', currentVideo.embed);
    iframeEl.src = currentVideo.embed;
    iframeEl.style.display = 'block';
  } else {
    // No sources available, do nothing silently
  }

  // Display 4 related videos
  let relatedVideos = getRelatedVideos(currentVideo);
  displayRelatedVideos(relatedVideos);
  document.getElementById('relatedSection').style.display = 'block';

  window.scrollTo({ top: player.offsetTop, behavior: 'smooth' });
  closeMenu();
}

// Define goHome() function
function goHome() {
  performSearch('');
  window.history.pushState({}, '', '#');
}

// Initialize the homepage with videos on page load
window.onload = () => {
  performSearch('');
  // Handle URL hash for specific video
  const hash = window.location.hash;
  if (hash.startsWith('#video=')) {
    const videoTitle = decodeURIComponent(hash.replace('#video=', ''));
    const index = videos.findIndex(v => v.title === videoTitle);
    if (index !== -1) {
      playVideo(index);
    }
  }
};
